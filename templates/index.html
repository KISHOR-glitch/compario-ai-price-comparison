<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compario AI - Product Comparison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="navbar-content">
                <a href="/" class="navbar-brand">Compario AI</a>
                <div class="navbar-nav" id="navButtons"></div>
            </div>
        </nav>

        <div id="authContent" class="auth-content">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <h1 class="auth-title">Welcome to Compario AI</h1>
                        <p class="auth-subtitle">Compare prices across Amazon, Flipkart, and Myntra</p>
                    </div>

                    <form id="loginForm">
                        <div class="form-group">
                            <label class="form-label" for="email">Email Address</label>
                            <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="password">Password</label>
                            <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%;">
                            Sign In
                        </button>
                    </form>

                    <div class="auth-divider">
                        <span>or</span>
                    </div>

                    <div class="auth-header" style="margin-bottom: 32px;">
                        <h2 class="auth-title" style="font-size: 28px;">Create Account</h2>
                        <p class="auth-subtitle">New to Compario AI? Sign up below</p>
                    </div>

                    <form id="signupForm">
                        <div class="form-group">
                            <label class="form-label" for="name">Full Name</label>
                            <input type="text" id="name" class="form-input" placeholder="Enter your full name" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="email2">Email Address</label>
                            <input type="email" id="email2" class="form-input" placeholder="Enter your email" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="password2">Password</label>
                            <input type="password" id="password2" class="form-input" placeholder="Create a password" required>
                        </div>

                        <button type="submit" class="btn btn-secondary" style="width: 100%;">
                            Create Account
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div id="homeContent" class="home-content">
            <div class="page-header">
                <h1 class="page-title">Upload Product Image</h1>
                <p class="page-subtitle">Compare prices across multiple platforms instantly</p>
            </div>

            <div class="upload-section">
                <div class="card">
                    <form id="uploadForm" style="padding: 40px;">
                        <div class="form-group">
                            <div class="file-upload-wrapper">
                                <input type="file" name="image" id="imageInput" class="file-upload-input" accept="image/*" required>
                                <label for="imageInput" class="file-upload-label">
                                    <span style="font-size: 64px; margin-bottom: 16px;">📸</span>
                                    <span style="font-weight: 600; font-size: 21px; margin-bottom: 8px; color: var(--apple-black);">Choose an image</span>
                                    <span style="font-size: 17px; color: var(--apple-gray);">or drag and drop here</span>
                                </label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
                            Search Products
                        </button>
                    </form>
                </div>
            </div>

            <div id="results" class="results-section"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        const authContent = document.getElementById("authContent");
        const homeContent = document.getElementById("homeContent");
        const navButtons = document.getElementById("navButtons");

        function checkAuth() {
            const userId = localStorage.getItem("user_id");
            if (!userId) {
                authContent.classList.add("active");
                homeContent.classList.remove("active");
                navButtons.innerHTML = '';
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return false;
            } else {
                authContent.classList.remove("active");
                homeContent.classList.add("active");
                navButtons.innerHTML = `
                    <a href="/" class="btn">Home</a>
                    <a href="/cart-page" class="btn">Cart</a>
                    <a href="/favorites-page" class="btn">Favorites</a>
                    <a href="/history-page" class="btn">History</a>
                    <button onclick="logout()" class="btn btn-logout">Logout</button>
                `;
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return true;
            }
        }

        function logout() {
            fetch("/logout", { method: "POST" })
                .then(() => {
                    localStorage.removeItem("user_id");
                    checkAuth();
                    showAlert("Logged out successfully", "success");
                });
        }

        document.addEventListener('DOMContentLoaded', checkAuth);

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            setLoading(submitBtn, true);

            try {
                const res = await fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: document.getElementById("email").value,
                        password: document.getElementById("password").value
                    })
                });

                const data = await res.json();
                
                if (data.user_id) {
                    localStorage.setItem("user_id", data.user_id);
                    e.target.reset();
                    showAlert("Login successful! Redirecting...", "success");
                    setTimeout(() => {
                        checkAuth();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }, 500);
                } else {
                    showAlert(data.error || "Login failed", "error");
                }
            } catch (error) {
                showAlert("An error occurred. Please try again.", "error");
            } finally {
                setLoading(submitBtn, false);
            }
        });

        document.getElementById("signupForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            setLoading(submitBtn, true);

            try {
                const res = await fetch("/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: document.getElementById("name").value,
                        email: document.getElementById("email2").value,
                        password: document.getElementById("password2").value
                    })
                });

                const data = await res.json();
                
                if (res.ok) {
                    showAlert(data.message || "Account created successfully!", "success");
                    e.target.reset();
                } else {
                    showAlert(data.error || "Signup failed", "error");
                }
            } catch (error) {
                showAlert("An error occurred. Please try again.", "error");
            } finally {
                setLoading(submitBtn, false);
            }
        });

        document.getElementById("uploadForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            setLoading(submitBtn, true);
            
            const fd = new FormData(form);
            fd.append("user_id", localStorage.getItem("user_id"));
            
            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = '<div class="card" style="padding: 40px; text-align: center;"><div class="results-header" style="font-size: 21px;">Searching products...</div></div>';

            try {
                const res = await fetch("/upload", { method: "POST", body: fd });
                const data = await res.json();

                if (res.ok) {
                    resultsDiv.innerHTML = '<div class="results-header">Search Results</div>';
                    
                    if (data.scraped_results && data.scraped_results.length > 0) {
                        data.scraped_results.forEach(product => {
                            const card = createProductCard(product);
                            resultsDiv.appendChild(card);
                        });
                    } else {
                        resultsDiv.innerHTML += '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">No products found</div><div class="empty-state-subtext">Try a different image</div></div>';
                    }
                } else {
                    showAlert(data.error || 'Upload failed', 'error');
                    resultsDiv.innerHTML = '';
                }
            } catch (error) {
                showAlert('An error occurred. Please try again.', 'error');
                resultsDiv.innerHTML = '';
            } finally {
                setLoading(submitBtn, false);
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Compario AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <script>
        if (!localStorage.getItem("user_id")) {
            window.location.href = "/";
        }
    </script>

    <div class="container">
        <nav class="navbar">
            <div class="navbar-content">
                <a href="/" class="navbar-brand">Compario AI</a>
                <div class="navbar-nav">
                    <a href="/" class="btn">Home</a>
                    <a href="/cart-page" class="btn">Cart</a>
                    <a href="/favorites-page" class="btn">Favorites</a>
                    <a href="/history-page" class="btn">History</a>
                    <button onclick="logout()" class="btn btn-logout">Logout</button>
                </div>
            </div>
        </nav>

        <div class="page-header">
            <h1 class="page-title">Your Shopping Cart</h1>
            <p class="page-subtitle">Review and manage your selected items</p>
        </div>

        <div id="cartItems"></div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        const userId = localStorage.getItem("user_id");
        const cartContainer = document.getElementById("cartItems");

        function logout() {
            fetch("/logout", { method: "POST" })
                .then(() => {
                    localStorage.removeItem("user_id");
                    window.location.href = "/";
                });
        }

        function loadCart() {
            fetch(`/cart/${userId}`)
                .then(res => res.json())
                .then(items => {
                    if (items.length === 0) {
                        cartContainer.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">🛒</div>
                                <div class="empty-state-text">Your cart is empty</div>
                                <div class="empty-state-subtext">Start adding products to your cart</div>
                                <a href="/" class="btn btn-primary" style="margin-top: 24px;">Start Shopping</a>
                            </div>
                        `;
                        return;
                    }

                    cartContainer.innerHTML = '';
                    items.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'product-card';
                        card.innerHTML = `
                            <div class="product-title">${item.title}</div>
                            <div class="product-price">${formatPrice(item.price)}</div>
                            <div class="product-actions">
                                <a href="${item.link}" target="_blank" class="btn btn-primary btn-sm">
                                    View Product
                                </a>
                                <button onclick="deleteItem(${item.id})" class="btn btn-secondary btn-sm">
                                    Remove
                                </button>
                            </div>
                        `;
                        cartContainer.appendChild(card);
                    });
                })
                .catch(error => {
                    showAlert('Failed to load cart items', 'error');
                    cartContainer.innerHTML = '<div class="empty-state"><div class="empty-state-text">Failed to load cart</div></div>';
                });
        }

        function deleteItem(id) {
            if (!confirm('Are you sure you want to remove this item from your cart?')) {
                return;
            }

            fetch(`/cart/delete/${id}`, { method: "DELETE" })
                .then(res => res.json())
                .then(data => {
                    showAlert('Item removed from cart', 'success');
                    loadCart();
                })
                .catch(error => {
                    showAlert('Failed to remove item', 'error');
                });
        }

        loadCart();
    </script>
</body>
</html>
